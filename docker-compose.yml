services:
  postgres:
    image: postgres:16-alpine
    container_name: rivet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rivet
      POSTGRES_PASSWORD: rivet
      POSTGRES_DB: rivet
    ports:
      - "5432:5432"
    volumes:
      - rivet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rivet -d rivet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rivet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rivet_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rivet_postgres_data:
  rivet_redis_data:
